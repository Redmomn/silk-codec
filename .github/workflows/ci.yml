name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true
# ref https://github.com/zmwangx/rust-ffmpeg/blob/master/.github/workflows/build.yml
jobs:
  check_windows:
    runs-on: windows-latest
    env:
      FFMPEG_DOWNLOAD_URL: https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full-shared.7z
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: 'true'
          fetch-depth: '1'
      - name: Install dependencies
        run: |
          $VCINSTALLDIR = $(& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath)
          Add-Content $env:GITHUB_ENV "LIBCLANG_PATH=${VCINSTALLDIR}\VC\Tools\LLVM\x64\bin`n"
          Invoke-WebRequest "${env:FFMPEG_DOWNLOAD_URL}" -OutFile ffmpeg-release-full-shared.7z
          7z x ffmpeg-release-full-shared.7z
          mkdir ffmpeg
          mv ffmpeg-*/* ffmpeg/
          Add-Content $env:GITHUB_ENV "FFMPEG_DIR=${pwd}\ffmpeg`n"
          Add-Content $env:GITHUB_PATH "${pwd}\ffmpeg\bin`n"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: lint
        run: cargo clippy --all-features -- -D warnings
      - name: build
        run: cargo build
      - name: build ffmpeg
        run: cargo build --features ffmpeg
      - name: build ffmpeg static
        run: cargo build --features ffmpeg-static

  check_linux:
    strategy:
      matrix:
        ffmpeg_version: [ "6.1", "7.0", "7.1", "8.0", "8.1" ]
    runs-on: ubuntu-latest
    env:
      FFMPEG_DIR: /home/runner/work/rust-ffmpeg/rust-ffmpeg/ffmpeg-${{ matrix.ffmpeg_version }}-linux-clang-default
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: 'true'
          fetch-depth: '1'
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends clang curl pkg-config xz-utils libxv-dev libc++-dev
          sudo apt install -y --no-install-recommends libavcodec-dev libavformat-dev libavutil-dev libswresample-dev libswscale-dev libavfilter-dev libavdevice-dev
          curl -L https://sourceforge.net/projects/avbuild/files/linux/ffmpeg-${{ matrix.ffmpeg_version }}-linux-clang-default.tar.xz/download -o ffmpeg.tar.xz
          tar -xf ffmpeg.tar.xz
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: lint
        run: cargo clippy --all-features -- -D warnings
      - name: build
        run: cargo build
      - name: build ffmpeg
        run: cargo build --features ffmpeg
      - name: build ffmpeg static
        run: cargo build --features ffmpeg-static

  check_macos:
    env:
      LIBRARY_PATH: $(brew --prefix)/lib
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: 'true'
          fetch-depth: '1'
      - name: Install dependencies
        run: |
          brew install ffmpeg pkg-config
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: lint
        run: cargo clippy --all-features -- -D warnings
      - name: build
        run: cargo build
      - name: build ffmpeg
        run: cargo build --features ffmpeg
      - name: build ffmpeg static
        run: cargo build --features ffmpeg-static
