name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  check_windows:
    strategy:
      matrix:
        toolchain:
          - target: x86_64-pc-windows-msvc
          - target: x86_64-pc-windows-gnu
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: 'true'
          fetch-depth: '1'
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.toolchain.target }}
          components: clippy
      - name: lint
        run: cargo clippy --target ${{ matrix.toolchain.target }} --all-features -- -D warnings
      - name: build
        run: cargo build --target ${{ matrix.toolchain.target }} --all-features --verbose

  check_linux:
    strategy:
      matrix:
        ffmpeg_version: [ "3.4", "4.0", "4.1", "4.2", "4.3", "4.4", "5.0", "5.1", "6.0" ]
        toolchain:
          - target: x86_64-unknown-linux-gnu
            gcc_package: gcc
          - target: aarch64-unknown-linux-gnu
            gcc_package: gcc-aarch64-linux-gnu
    runs-on: ubuntu-latest
    container: jrottenberg/ffmpeg:${{ matrix.ffmpeg_version }}-ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: 'true'
          fetch-depth: '1'
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.toolchain.target }}
          components: clippy
      - name: Install cross-compilation toolchain
        run: |
          sudo apt update
          sudo apt install -y ${{ matrix.toolchain.gcc_package }}
      - name: lint
        run: cargo clippy --target ${{ matrix.toolchain.target }} --all-features -- -D warnings
      - name: build
        run: cargo build --target ${{ matrix.toolchain.target }} --all-features --verbose

  check_macos:
    strategy:
      matrix:
        toolchain:
          - target: x86_64-apple-darwin
          - target: aarch64-apple-darwin
    env:
      LIBRARY_PATH: $(brew --prefix)/lib
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: 'true'
          fetch-depth: '1'
      - name: Install dependencies
        run: |
          brew install ffmpeg pkg-config
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.toolchain.target }}
          components: clippy
      - name: lint
        run: cargo clippy --target ${{ matrix.toolchain.target }} --all-features -- -D warnings
      - name: build
        run: cargo build --target ${{ matrix.toolchain.target }} --all-features --verbose
